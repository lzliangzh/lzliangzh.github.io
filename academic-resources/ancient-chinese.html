:root {
  --main-color: #444444;
  /* == 字体设置 == */
  /* 基准字体 */
  /* 备选：Times, "Times New Roman" */
  /* --base-Latin-font: "Latin Modern Roman", "Latin Modern Roman 10", Times; */
  --base-Latin-font: "Karma";
  --base-Chinese-font: "思源宋体 CN";
  --base-font-size: 12pt;
  /* 引言字体 */
  --quote-font: "Karma", "ChillKai";
  /* em单位为一个正文字符（--base-font-size）大小，
  例如，如果您设置 --base-font-size 为 9.5pt，那么 1.05em = 1.05*9.5pt ≈ 10pt。下面的标题字体等设置也遵循该规则。
  这样，您就可以仅通过调整基准字体大小，而动态对其他元素大小做出调整。
  当然，您也可以直接设置以pt或px为单位的数值，将元素的大小固定下来，如 --quote-font-size: 10pt; */
  --quote-font-size: 0.9em;
  /* 代码字体（代码中的中文会调用 ui-font） */
  /* "Courier New" 从 Windows 3.1 起成为 Windows 官方提供的字体 */
  /* "Consolas" 从 Windows Vista 起成为 Windows 官方提供的字体 */
  --code-font: "Latin Modern Mono", "Latin Modern Mono 10", "Consolas", "Courier New";
  /* 侧边栏字体 */
  --ui-font: "苹方-简";
  /* source mode 字体 */
  /* 默认调用 code-font 和 ui-font */
  --sourceMode-font: "SF Mono", "苹方-简";
  /* 目录字体 */
  /* 默认调用 base-font */
  --toc-font: "";
  /* 默认调用 base-font-size */
  --toc-font-size: "";
  /* 公式字体 */
  --math-font-size: 1em;
  /* 表格字体 */
  /* 默认调用 heading-font */
  --table-title-font: "";
  /* 默认调用 base-font */
  --table-font: "";
  /* 标题字体（总设置） */
  /* 注意，如果您使用macOS系统并更改了英文字体，请在此处更换标题英文字体粗体字重的postscript值 */
  --heading-Latin-font: "Karma";
  --heading-Chinese-font: "ChillKai";
  /* 非大标题(h1_h2)的英文数字字体设置 */
  --h-Latin-font: "Karma";
  /* 标题字体分别设置 */
  /* 大标题（h1）字体 */
  --title-Chinese-font: "Karma", "ChillKai";
  --title-font-size: 2.5em;
  /* h2字体 */
  --h2-Chinese-font: "Karma", "ChillKai";
  --h2-font-size: 1.5em;
  /* h3字体 */
  --h3-Chinese-font: "Karma", "思源宋体 CN";
  --h3-font-size: 1.25em;
  /* h4字体 */
  --h4-Chinese-font: "Karma", "ChillKai";
  --h4-font-size: 1.15em;
  /* h5字体 */
  --h5-Chinese-font: "Karma", "思源宋体 CN";
  --h5-font-size: 1.10em;
  /* h6字体 */
  --h6-Chinese-font: "Karma", "思源宋体 CN";
  --h6-font-size: 1.05em;
  /* 粗体、斜体样式设置 */
  /* 加粗风格时使用的字重；400等同于 normal，700等同于 bold，900等同于 heavy */
  --strong-font: "FiraSans-Medium", "NotoSansHans-Medium";
  --em-font: "Karma", "ChillKai";
  /* 基础行距 */
  --base-line-height: 1.618em;
  /* == 页面设置 == */
  /* 打印页边距 */
  --set-margin: 2.2cm 2.7cm 2.2cm 2.7cm !important;
  /* == 控制设置 == */
  /* 目录中是否显示一级标题 */
  --toc-show-title: none;
  /* == 颜色设置 == */
  /* 超链接颜色 */
  --link-color-light: #2E67D3;
  --link-color-dark: #8bb1f9;
}
